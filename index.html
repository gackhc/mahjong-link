<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>마작 기록장 연결</title>
    <style>
        body {
            text-align: center;
            padding: 50px 20px;
            font-family: 'Pretendard', -apple-system, sans-serif;
            background-color: #f8f9fa;
            color: #333;
        }
        .container {
            max-width: 450px;
            margin: 0 auto;
            background: white;
            padding: 40px 25px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
        }
        .icon { font-size: 50px; margin-bottom: 20px; }
        h3 { margin: 0 0 10px 0; font-size: 22px; }
        p { color: #666; font-size: 15px; line-height: 1.6; margin-bottom: 35px; }
        
        /* 버튼 공통 스타일 */
        .btn {
            display: block;
            width: 100%;
            padding: 18px 0;
            margin: 12px 0;
            font-size: 17px;
            font-weight: 700;
            text-decoration: none;
            border-radius: 14px;
            transition: all 0.2s ease;
            border: none;
            cursor: pointer;
        }
        .btn:active { transform: scale(0.97); opacity: 0.9; }

        /* 앱 실행 버튼 (메인 색상) */
        .btn-primary {
            background-color: #007bff;
            color: white;
        }
        /* 앱 설치 버튼 (보조 색상) */
        .btn-secondary {
            background-color: #f1f3f5;
            color: #495057;
            border: 1px solid #dee2e6;
        }

        .footer-note {
            margin-top: 25px;
            font-size: 12px;
            color: #adb5bd;
        }
    </style>
    <script>
        let intentUrl = "";
        const installUrl = "https://drive.google.com/file/d/1E_8k1E3SgKhp1Zx4QI0KDCMxqj7uTzuo/view?usp=sharing";

        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            const sheetId = urlParams.get('id');

            if (sheetId) {
                // 인텐트 주소만 미리 만들어 둡니다 (자동 실행 X)
                intentUrl = "intent://sheet/d/" + sheetId + "#Intent;scheme=mahjong;package=ggack.mahjongsheet;end;";
            } else {
                document.getElementById("message").innerText = "알림";
                document.getElementById("sub-message").innerText = "연결할 시트 정보가 없습니다.";
                document.getElementById("btn-open").style.display = "none";
            }
        };

        // [버튼 클릭 시에만 실행]
        function openApp() {
            if (intentUrl) {
                window.location.href = intentUrl;
            }
        }

        function installApp() {
            window.location.href = installUrl;
        }
    </script>
</head>
<body>

    <div class="container">
        <div class="icon">🀄</div>
        <h3 id="message">마작 기록장</h3>
        <p id="sub-message">공유받은 기록을 확인하기 위해<br>아래 버튼을 선택해 주세요.</p>

        <button id="btn-open" onclick="openApp()" class="btn btn-primary">
            마작 기록장 앱으로 이동
        </button>

        <button onclick="installApp()" class="btn btn-secondary">
            앱이 없으신가요? 설치하기
        </button>

        <p class="footer-note">
            인앱 브라우저(카톡 등)에서 연결이 안 될 경우<br>
            상단 메뉴의 <b>'브라우저로 열기'</b>를 눌러주세요.
        </p>
    </div>

</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>마작 기록장 연결</title>
    <style>
        body {
            text-align: center;
            padding: 50px 20px;
            font-family: 'Pretendard', -apple-system, sans-serif;
            background-color: #f8f9fa;
            color: #333;
        }
        .container {
            max-width: 450px;
            margin: 0 auto;
            background: white;
            padding: 40px 25px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
        }
        .icon { font-size: 50px; margin-bottom: 20px; }
        h3 { margin: 0 0 10px 0; font-size: 22px; }
        p { color: #666; font-size: 15px; line-height: 1.6; margin-bottom: 35px; }
        
        /* 버튼 공통 스타일 */
        .btn {
            display: block;
            width: 100%;
            padding: 18px 0;
            margin: 12px 0;
            font-size: 17px;
            font-weight: 700;
            text-decoration: none;
            border-radius: 14px;
            transition: all 0.2s ease;
            border: none;
            cursor: pointer;
        }
        .btn:active { transform: scale(0.97); opacity: 0.9; }

        /* 앱 실행 버튼 (메인 색상) */
        .btn-primary {
            background-color: #007bff;
            color: white;
        }
        /* 앱 설치 버튼 (보조 색상) */
        .btn-secondary {
            background-color: #f1f3f5;
            color: #495057;
            border: 1px solid #dee2e6;
        }
        /* 웹 버전 버튼 (초록색 계열) */
        .btn-web {
            background-color: #28a745;
            color: white;
            margin-top: 8px; /* 버튼 사이 간격 */
        }

        .footer-note {
            margin-top: 25px;
            font-size: 12px;
            color: #adb5bd;
        }
    </style>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getRemoteConfig, fetchAndActivate, getString } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-remote-config.js";

        // 🚨 주의: Firebase 콘솔에서 '웹 앱'을 추가하고 아래 설정값을 복사해서 넣어주세요!
        const firebaseConfig = {
          apiKey: "AIzaSyBzuI8NJ03uRTy5OOF7QycZXcnqSAcUwwA",
          authDomain: "mahjongs-e07d3.firebaseapp.com",
          projectId: "mahjongs-e07d3",
          storageBucket: "mahjongs-e07d3.firebasestorage.app",
          messagingSenderId: "727926338004",
          appId: "1:727926338004:web:d140565ae1e58ea2eea641",
          measurementId: "G-Z2WZBEJS87"
        };

        // Firebase 초기화
        const app = initializeApp(firebaseConfig);
        const remoteConfig = getRemoteConfig(app);
        
        // 웹에서는 캐시 시간을 짧게 하거나 기본값(12시간) 사용 (테스트 시엔 0으로 설정)
        remoteConfig.settings.minimumFetchIntervalMillis = 0;

        // 기존 하드코딩된 기본 주소 (Firebase 통신 실패 시 대비용)
        window.installUrl = "https://play.google.com/store/apps/details?id=ggack.mahjongsheet";

        // Remote Config 값 가져오기
        fetchAndActivate(remoteConfig)
            .then(() => {
                const updateId = getString(remoteConfig, "update_id");
                if (updateId) {
                    // Firebase에서 가져온 update_id로 설치 링크 갱신
                    window.installUrl = "https://drive.google.com/file/d/" + updateId + "/view?usp=sharing";
                    console.log("최신 업데이트 링크 적용 완료: ", window.installUrl);
                }
            })
            .catch((err) => {
                console.error("Firebase 원격 구성을 불러오는데 실패했습니다.", err);
            });
    </script>

    <script>
        let intentUrl = "";

        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            const sheetId = urlParams.get('id');

            if (sheetId) {
                // 인텐트 주소 설정
                intentUrl = "intent://sheet/d/" + sheetId + "#Intent;scheme=mahjong;package=ggack.mahjongsheet;end;";
            }  else {
                document.getElementById("btn-open").style.display = "none";
                document.getElementById("sub-message").style.display = "none";
                document.getElementById("btn-web").style.display = "none";
            }
        };

        // [버튼 클릭 시에만 실행]
        function openApp() {
            if (intentUrl) {
                window.location.href = intentUrl;
            }
        }

        function installApp() {
            // 위 모듈 스크립트에서 갱신한 window.installUrl 사용
            window.location.href = window.installUrl;
        }

        function openWebVersion() {
            const urlParams = new URLSearchParams(window.location.search);
            const sheetId = urlParams.get('id');
            const targetUrl = "https://mahjongs-e07d3.web.app/?id=" + sheetId;
        
            if (!sheetId) {
                alert("시트 ID 정보가 없습니다.");
                return;
            }
        
            const userAgent = navigator.userAgent.toLowerCase();
            
            // 1. 카카오톡 인앱 브라우저 강제 탈출 (카카오 전용 커스텀 스킴)
            if (userAgent.includes('kakaotalk')) {
                location.href = 'kakaotalk://web/openExternal?url=' + encodeURIComponent(targetUrl);
                return;
            }
        
            // 2. 안드로이드 범용 외부 브라우저 호출 (Chrome 강제 지정)
            if (userAgent.includes('android')) {
                const intentUrl = 'intent://' + targetUrl.replace(/https?:\/\//i, '') + '#Intent;scheme=https;package=com.android.chrome;end';
                location.href = intentUrl;
                return;
            }
        
            // 3. 아이폰(iOS)이나 기타 환경
            // iOS는 보안상 강제 호출이 거의 불가능하므로 기존대로 이동하거나 안내를 띄워야 합니다.
            window.location.href = targetUrl;
        }
        
    </script>
</head>
<body>

    <div class="container">
        <div class="icon">🀄</div>
        <h3 id="message">마작 기록장</h3>
        <p id="sub-message">공유받은 기록을 확인하기 위해<br>아래 버튼을 선택해 주세요.</p>

        <button id="btn-open" onclick="openApp()" class="btn btn-primary">
            마작 기록장 앱으로 이동
        </button>

        <button onclick="installApp()" class="btn btn-secondary">
            앱이 없으신가요? 설치하기
        </button>
        <button id="btn-web" onclick="openWebVersion()" class="btn btn-web">
            웹 버전으로 입력하기 (설치없이 입력하기)
        </button>
        <p id="sub-message2">로그인 시 민감한 정보 창에서 <br>좌하단 고급 -> 마작기록장 가기 항목을 선택하고<br>요구하는 모든 권한을 부여해주세요.</p>
        <p class="footer-note">
            인앱 브라우저(카톡 등)에서 연결이 안 될 경우<br>
            상단 메뉴의 <b>'브라우저로 열기'</b>를 눌러주세요.
        </p>
    </div>

</body>
</html>

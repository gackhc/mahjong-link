<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mahjong Sheet</title>
    <style>
        body {
            text-align: center;
            padding: 50px 20px;
            font-family: 'Pretendard', -apple-system, sans-serif;
            background-color: #f8f9fa;
            color: #333;
        }
        .container {
            max-width: 450px;
            margin: 0 auto;
            background: white;
            padding: 40px 25px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
        }
        .icon { font-size: 50px; margin-bottom: 20px; }
        h3 { margin: 0 0 10px 0; font-size: 22px; }
        p { color: #666; font-size: 14px; line-height: 1.6; margin-bottom: 35px; }
        
        .btn {
            display: block;
            width: 100%;
            padding: 18px 0;
            margin: 12px 0;
            font-size: 17px;
            font-weight: 700;
            text-decoration: none;
            border-radius: 14px;
            transition: all 0.2s ease;
            border: none;
            cursor: pointer;
        }
        .btn:active { transform: scale(0.97); opacity: 0.9; }

        .btn-primary { background-color: #007bff; color: white; }
        .btn-secondary { background-color: #f1f3f5; color: #495057; border: 1px solid #dee2e6; }
        .btn-web { background-color: #28a745; color: white; margin-top: 8px; }

        .footer-note { margin-top: 25px; font-size: 12px; color: #adb5bd; }
    </style>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getRemoteConfig, fetchAndActivate, getString } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-remote-config.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBzuI8NJ03uRTy5OOF7QycZXcnqSAcUwwA",
            authDomain: "mahjongs-e07d3.firebaseapp.com",
            projectId: "mahjongs-e07d3",
            storageBucket: "mahjongs-e07d3.firebasestorage.app",
            messagingSenderId: "727926338004",
            appId: "1:727926338004:web:d140565ae1e58ea2eea641",
            measurementId: "G-Z2WZBEJS87"
        };

        const app = initializeApp(firebaseConfig);
        const remoteConfig = getRemoteConfig(app);
        remoteConfig.settings.minimumFetchIntervalMillis = 0;

        fetchAndActivate(remoteConfig)
            .then(() => {
                const updateId = getString(remoteConfig, "update_id");
                if (updateId) {
                    window.installUrl = "https://drive.google.com/file/d/" + updateId + "/view?usp=sharing";
                }
            })
            .catch((err) => { console.error("Firebase load failed", err); });
    </script>

    <script>
        window.installUrl = "https://play.google.com/store/apps/details?id=ggack.mahjongsheet";
        let intentUrl = "";

        const i18n = {
            ko: {
                title: "마작 기록장",
                sub1: "공유받은 기록을 확인하기 위해<br>아래 버튼을 선택해 주세요.",
                btnOpen: "마작 기록장 앱으로 이동",
                btnInstall: "앱이 없으신가요? 설치하기",
                btnWeb: "웹 버전으로 입력하기 (설치없이 이용)",
                footer: "인앱 브라우저(카톡 등)에서 연결이 안 될 경우<br>링크 복사 후 외부 브라우저(크롬, 사파리) 에서 시도해 주세요."
            },
            en: {
                title: "Mahjong Sheet",
                sub1: "To check shared records,<br>please select a button below.",
                btnOpen: "Open in App",
                btnInstall: "Install App",
                btnWeb: "Use Light Web Version (No Install)",
                footer: "If the link doesn't work in in-app browsers(Kakao, etc),<br>please copy the link and open it in an external browser (Chrome, Safari)."
            },
            ja: {
                title: "麻雀記録帳",
                sub1: "共有された記録を確認するには、<br>下のボタンを選択してください。",
                btnOpen: "アプリで開く",
                btnInstall: "アプリをインストール",
                btnWeb: "ウェブ版で入力 (インストール不要)",
                footer: "アプリ内ブラウザ（LINE等）で開けない場合は、<br>링크를 복사해서 외부 브라우저(Chrome, Safari)에서 실행해 주세요."
            },
            zh: {
                title: "麻将记录本",
                sub1: "为了查看共享记录，<br>请选择下方按钮。",
                btnOpen: "在应用中打开",
                btnInstall: "安装应用",
                btnWeb: "使用网页版 (无需安装)",
                footer: "如果在应用内浏览器（微信等）中无法连接，<br>请复制链接并在外部浏览器（Chrome，Safari）中尝试。"
            }
        };

        function applyLanguage(lang) {
            const data = i18n[lang] || i18n['en'];
            document.getElementById("message").innerHTML = data.title;
            document.getElementById("sub-message").innerHTML = data.sub1;
            document.getElementById("btn-open").innerHTML = data.btnOpen;
            document.getElementById("btn-install-text").innerHTML = data.btnInstall;
            document.getElementById("btn-web").innerHTML = data.btnWeb;
            document.getElementById("footer-text").innerHTML = data.footer;
            document.documentElement.lang = lang;
        }

        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            const sheetId = urlParams.get('id');
            
            let lang = navigator.language.split('-')[0];
            applyLanguage(lang);

            if (sheetId) {
                intentUrl = "intent://sheet/d/" + sheetId + "#Intent;scheme=mahjong;package=ggack.mahjongsheet;end;";
            } else {
                document.getElementById("btn-open").style.display = "none";
                document.getElementById("btn-web").style.display = "none";
                document.getElementById("sub-message").style.display = "none";
            }
        };

        function openApp() { if (intentUrl) window.location.href = intentUrl; }
        function installApp() { window.location.href = window.installUrl; }
        function openWebVersion() {
            const urlParams = new URLSearchParams(window.location.search);
            const sheetId = urlParams.get('id');
            const targetUrl = "https://mahjongs-e07d3.web.app/?id=" + (sheetId || "");
            const userAgent = navigator.userAgent.toLowerCase();
            
            if (userAgent.includes('kakaotalk')) {
                location.href = 'kakaotalk://web/openExternal?url=' + encodeURIComponent(targetUrl);
                return;
            }
            if (userAgent.includes('android')) {
                location.href = 'intent://' + targetUrl.replace(/https?:\/\//i, '') + '#Intent;scheme=https;package=com.android.chrome;end';
                return;
            }
            window.location.href = targetUrl;
        }
    </script>
</head>
<body>

    <div class="container">
        <div class="icon">🀄</div>
        <h3 id="message">마작 기록장</h3>
        <p id="sub-message"></p>

        <button id="btn-open" onclick="openApp()" class="btn btn-primary"></button>

        <button onclick="installApp()" class="btn btn-secondary">
            <span id="btn-install-text"></span>
        </button>
        
        <button id="btn-web" onclick="openWebVersion()" class="btn btn-web"></button>
        
        <p class="footer-note" id="footer-text"></p>
    </div>

</body>
</html>
